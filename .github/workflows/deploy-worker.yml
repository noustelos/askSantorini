name: Deploy Cloudflare Worker

# Auto-deploy disabled until CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID
# secrets are added under: GitHub repo → Settings → Secrets and variables → Actions.
# Re-enable by uncommenting the `push:` block below.
on:
  # push:
  #   branches: [main]
  #   paths:
  #     - "worker.js"
  #     - "wrangler.toml"
  #     - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy worker.js to Cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
